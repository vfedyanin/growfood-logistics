name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    env:
      # Фиктивные значения: сборка и проверка типов не подключаются к реальной БД.
      DATABASE_URL: postgresql://user:pass@localhost:5432/db
      DATABASE_URL_UNPOOLED: postgresql://user:pass@localhost:5432/db
      NEXTAUTH_SECRET: ci-dummy-secret-not-used-at-runtime
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
